<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  
  <!-- Geometric construction bracket / architectural C shape -->
  <!-- Top horizontal bar -->
  <rect x="120" y="100" width="272" height="52" fill="#F5C518"/>
  <!-- Bottom horizontal bar -->
  <rect x="120" y="360" width="272" height="52" fill="#F5C518"/>
  <!-- Left vertical bar -->
  <rect x="120" y="100" width="52" height="312" fill="#F5C518"/>
  
  <!-- Inner dark cutout to form the C -->
  <rect x="172" y="152" width="220" height="208" fill="#0a0a0a"/>
  
  <!-- Small accent square - construction marker -->
  <rect x="340" y="234" width="52" height="44" fill="#F5C518" opacity="0.3"/>
</svg>
